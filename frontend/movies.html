<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Movies</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #a8d0d1;
      color: rgb(15, 14, 14);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    .nav-links {
      display: flex;
      gap: 20px;
    }

    .nav-links a {
      color: #000;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
    }

    .nav-links a:hover {
      text-decoration: underline;
    }

    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .movie-card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      padding: 10px;
      text-align: center;
    }

    .movie-card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 10px;
    }

    .movie-card button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <h1>All Movies</h1>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
    </div>
  </header>

  <div class="movie-grid" id="movieGrid"></div>

  <script>
    fetch('movies.json')
      .then(res => res.json())
      .then(movies => {
        const grid = document.getElementById("movieGrid");
        movies.forEach(movie => {
          const card = document.createElement("div");
          card.className = "movie-card";
          card.innerHTML = `
            <img src="${movie.poster}" alt="${movie.title}">
            <h3>Movie</h3>
            <p>${movie.genre} | ${movie.language}</p>
            <p>${movie.duration}</p>
            <button onclick="bookNow(${movie.id}, '${movie.title}')">Book Now</button>
          `;
          grid.appendChild(card);
        });
      });

    function bookNow(id, title) {
      localStorage.setItem("movieId", id);
      localStorage.setItem("movieTitle", title);
      window.location.href = "booking.html";
    }
  </script>
</body>
</html>
