<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Tickets</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    header {
      background: #222;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-left {
      display: flex;
      gap: 20px;
    }

    .nav-left a {
      color: white;
      text-decoration: none;
      font-size: 16px;
    }

    .header-title {
      flex-grow: 1;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    h1, h2 {
      text-align: center;
      margin-top: 20px;
    }

    .seat-layout {
      display: grid;
      grid-template-columns: repeat(10, 40px);
      gap: 10px;
      justify-content: center;
      margin-top: 30px;
    }

    .seat {
      width: 40px;
      height: 40px;
      background: #ccc;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .seat:hover::after {
      content: attr(data-info);
      position: absolute;
      top: -25px;
      background: #000;
      color: #fff;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 12px;
      white-space: nowrap;
    }

    .seat.selected {
      background: #28a745;
      color: white;
      transform: scale(1.1);
    }

    .seat.selected::before {
      content: "✔";
      position: absolute;
      font-size: 14px;
      color: white;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px auto;
      flex-wrap: wrap;
    }

    .legend span {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 14px;
    }

    .premium {
      background: #f39c12;
    }

    .gold {
      background: #d35400;
      color: white;
    }

    .standard {
      background: #3498db;
      color: white;
    }

    .proceed {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .proceed:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <header>
    <div class="nav-left">
      <a href="index.html">🏠 Home</a>
      <a href="login.html">🔐 Login</a>
    </div>
    <div class="header-title">Book Tickets</div>
  </header>

  <h2 id="movie-title">Movie Title</h2>

  <div class="legend">
    <div><span class="premium">Premium (₹500)</span></div>
    <div><span class="gold">Gold (₹350)</span></div>
    <div><span class="standard">Standard (₹200)</span></div>
  </div>

  <div class="seat-layout" id="seatLayout"></div>

  <button class="proceed" onclick="proceedBooking()">Proceed to Pay</button>

  <script>
    const movieTitle = localStorage.getItem('movieTitle') || 'No movie selected';
    document.getElementById('movie-title').innerText = movieTitle;

    const seatLayout = document.getElementById("seatLayout");

    for (let i = 1; i <= 60; i++) {
      let seatType = "", info = "", className = "";

      if (i <= 20) {
        seatType = "Premium"; info = "Premium ₹500"; className = "premium";
      } else if (i <= 40) {
        seatType = "Gold"; info = "Gold ₹350"; className = "gold";
      } else {
        seatType = "Standard"; info = "Standard ₹200"; className = "standard";
      } 

      const seat = document.createElement("div");
      seat.className = "seat " + className;
      seat.dataset.info = info;
      seat.textContent = i;
      seat.addEventListener("click", () => {
        seat.classList.toggle("selected");
      });
      seatLayout.appendChild(seat);
    }

    function proceedBooking() {
      const selected = document.querySelectorAll(".seat.selected");
      const seatNumbers = Array.from(selected).map(seat => seat.textContent);
      if (seatNumbers.length === 0) {
        alert("Please select at least one seat.");
        return;
      }
      alert("You selected: " + seatNumbers.join(", "));
    }
  </script>
</body>
</html>
